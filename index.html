<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#faf8ef" />
  <title>2048</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="title">2048</div>
      <div class="scores-container">
        <div class="score-box">
          <div class="score-label">分数</div>
          <div class="score-value" id="score">0</div>
        </div>
        <div class="score-box">
          <div class="score-label">最高分</div>
          <div class="score-value" id="best-score">0</div>
        </div>
      </div>
    </div>

    <!-- Sub-header -->
    <div class="sub-header">
      <p class="description">合并相同数字，达到 <strong id="target-label">2048</strong>！</p>
      <div class="buttons">
        <button id="new-game-btn" class="btn" aria-label="新游戏">新游戏</button>
        <button id="undo-btn" class="btn btn-secondary" aria-label="撤销">撤销</button>
      </div>
    </div>

    <!-- Difficulty selector (generated by JS) -->
    <div class="difficulty-bar" id="difficulty-bar" role="group" aria-label="难度选择"></div>

    <!-- Game Board -->
    <div class="game-wrapper">
      <div class="game-board" id="game-board">
        <!-- Background grid cells (generated by JS) -->
        <div class="grid-container" id="grid-container"></div>
        <!-- Tiles (rendered by JS) -->
        <div class="tile-container" id="tile-container"></div>
      </div>

      <!-- Game Over Overlay -->
      <div class="overlay" id="game-over-overlay" role="dialog" aria-modal="true" aria-label="游戏结束">
        <div class="overlay-content">
          <div class="overlay-title">游戏结束！</div>
          <div class="overlay-score">最终得分：<span id="final-score">0</span></div>
          <button class="btn overlay-btn" id="restart-btn">再来一局</button>
        </div>
      </div>

      <!-- Win Toast (small, non-blocking) -->
      <div class="win-toast" id="win-toast" aria-live="polite"></div>
    </div>

    <!-- Instructions -->
    <div class="instructions">
      <p>方向键 / WASD 移动 &nbsp;·&nbsp; 手机滑动操作</p>
      <p class="save-hint" id="save-hint"></p>
    </div>

  </div>

  <!-- Score animation container (fixed, outside flow) -->
  <div id="score-additions" aria-hidden="true"></div>

  <script src="game.js"></script>
</body>
</html>
